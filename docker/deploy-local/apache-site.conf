<VirtualHost *:80>
    ServerName localhost

    DocumentRoot /srv/codeigniter-tutorial/current/public

    <Directory /srv/codeigniter-tutorial/current/public>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Front controller: only rewrite when no real file/dir under DocumentRoot (REQUEST_FILENAME is unreliable here).
    RewriteEngine On
    RewriteCond %{DOCUMENT_ROOT}%{REQUEST_URI} -f [OR]
    RewriteCond %{DOCUMENT_ROOT}%{REQUEST_URI} -d
    RewriteRule ^ - [L]
    RewriteRule ^(.*)$ index.php/$1 [L,QSA]

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>

; LAMP appserver merges this ini; loaded after defaults.
; Xdebug 3 ships with start_with_request=trigger unless overridden — without a browser
; extension cookie the IDE never connects. This enables auto-start while developing.
xdebug.start_with_request=yes

; Elastic APM PHP agent — extension + bootstrap are installed by the Elastic .deb (see .lando.yml build_as_root).
; Official binary agent only (not Composer): https://github.com/elastic/apm-agent-php
; Elastic recommends avoiding running Xdebug and APM together in production; both stay enabled here for this lab.
elastic_apm.enabled=true
elastic_apm.service_name=codeigniter-job-board
elastic_apm.environment=local
elastic_apm.server_url=http://apm-server:8200
elastic_apm.transaction_sample_rate=1.0
elastic_apm.capture_errors=true

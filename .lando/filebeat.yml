filebeat.inputs:
  - type: filestream
    id: codeigniter-json-logs
    enabled: true
    paths:
      - /app/writable/logs/log-*.json
    parsers:
      - ndjson:
          target: ""
          add_error_key: true
    fields:
      service.name: codeigniter-job-board
      event.dataset: codeigniter.app
    fields_under_root: true

processors:
  - add_host_metadata: ~
  - add_docker_metadata: ~

setup.kibana:
  host: http://kibana:5601

output.elasticsearch:
  hosts: ["http://elasticsearch:9200"]
  index: "codeigniter-app-logs-%{+yyyy.MM.dd}"

setup.template.name: "codeigniter-app-logs"
setup.template.pattern: "codeigniter-app-logs-*"

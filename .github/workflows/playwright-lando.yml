name: Playwright E2E (Lando)

# Single job: one Lando stack + MySQL lifecycle (avoids parallel workflows racing CI resources).
# Playwright browser tests, then queue worker + log asserts, then scheduled Tasks housekeeping.

# Uses GitHub-hosted Docker + setup-lando: https://docs.lando.dev/install/gha.html

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: playwright-lando-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright-lando:
    name: Lando + Playwright + queue/tasks verification
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Lando
        uses: lando/setup-lando@v3
        with:
          lando-version: stable
          telemetry: false

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer:v2
          coverage: none
          extensions: intl, mbstring

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Composer dependencies (host filesystem = Lando mount)
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend assets
        run: pnpm build

      - name: Create .env for Lando
        run: |
          cat > .env <<'EOF'
          CI_ENVIRONMENT = development
          app.baseURL = 'https://my-first-lamp-app.lndo.site/'
          app.forceGlobalSecureRequests = true
          app.indexPage = ''
          # Same hostname Lando documents in `lando info` → internal_connection.host (`database`).
          database.default.hostname = database
          database.default.database = lamp
          database.default.username = lamp
          database.default.password = lamp
          database.default.DBDriver = MySQLi
          database.default.port = 3306
          EOF

      - name: Start Lando
        run: lando start

      - name: Resolve appserver URL for Playwright
        id: lando
        run: |
          set -euo pipefail
          JSON=$(lando info --format=json)
          echo "::group::lando info (truncated)"
          echo "$JSON" | head -c 12000
          echo
          echo "::endgroup::"
          LOCAL_HTTPS=$(echo "$JSON" | jq -r '.[] | (.urls[]? // empty) | select(test("^https://localhost(:[0-9]+)?/?$"))' | head -n1)
          LOCAL_HTTP=$(echo "$JSON" | jq -r '.[] | (.urls[]? // empty) | select(test("^http://localhost(:[0-9]+)?/?$"))' | head -n1)
          HTTPS=$(echo "$JSON" | jq -r '.[] | (.urls[]? // empty) | select(test("^https://"))' | head -n1)
          HTTP=$(echo "$JSON" | jq -r '.[] | (.urls[]? // empty) | select(test("^http://"))' | head -n1)
          # GitHub-hosted runners can be flaky resolving *.lndo.site; the localhost
          # proxy URL from `lando info` is the most direct readiness target.
          URL="${LOCAL_HTTPS:-${LOCAL_HTTP:-${HTTPS:-}}}"
          IGNORE="false"
          if [[ "$URL" == https://* ]]; then
            IGNORE="true"
          elif [[ -z "$URL" ]]; then
            URL="${HTTP:-}"
          fi
          if [[ -z "$URL" ]]; then
            echo "Could not find an HTTP or HTTPS appserver URL in lando info output."
            exit 1
          fi
          BASE="${URL%/}"
          echo "Resolved base URL: $BASE (ignore_https_errors=$IGNORE)"
          echo "base-url=$BASE" >> "$GITHUB_OUTPUT"
          echo "ignore-https=$IGNORE" >> "$GITHUB_OUTPUT"

      - name: Update app baseURL to resolved Lando URL
        run: |
          set -euo pipefail
          BASE="${{ steps.lando.outputs.base-url }}/"
          php -r '$path = ".env"; $base = $argv[1]; $env = file_get_contents($path); $env = preg_replace("/^app\.baseURL\s*=.*$/m", "app.baseURL = " . var_export($base, true), $env); file_put_contents($path, $env);' "$BASE"
          grep '^app\.baseURL' .env

      - name: Wait until MySQL accepts connections from appserver
        run: |
          set -euo pipefail
          lando php scripts/ci-wait-mysql.php

      - name: Run database migrations
        run: |
          set -euo pipefail
          lando php spark migrate --all

      - name: Wait for CodeIgniter /hello route
        run: |
          set -euo pipefail
          BASE="${{ steps.lando.outputs.base-url }}"
          CURL=(curl -sS --connect-timeout 5)
          if [[ "$BASE" == https://* ]]; then
            CURL+=(--insecure)
          fi
          for i in $(seq 1 48); do
            CODE=$("${CURL[@]}" -o /tmp/hello-response.txt -w '%{http_code}' "${BASE}/hello" || true)
            if [[ "$CODE" == "200" ]]; then
              echo "Ready after poll $i"
              exit 0
            fi
            echo "waiting for ${BASE}/hello ... status=${CODE:-curl-failed}"
            if [[ "$i" == "1" || "$i" == "48" ]]; then
              echo "::group::/hello response sample"
              head -c 2000 /tmp/hello-response.txt || true
              echo
              echo "::endgroup::"
            fi
            sleep 10
          done
          echo "::group::CodeIgniter logs"
          ls -la writable/logs || true
          for f in writable/logs/log-*.log; do
            echo "--- $f"
            tail -n 120 "$f" || true
          done
          echo "::endgroup::"
          echo "::group::Apache error log"
          lando ssh -s appserver -c 'tail -n 120 /var/log/apache2/error.log' || true
          echo "::endgroup::"
          exit 1

      - name: Enable Tasks (Settings DB)
        run: lando php spark tasks:enable

      - name: Seed job portal demo data
        run: lando php spark db:seed JobPortalDemoSeeder

      - name: Install Chromium (Playwright)
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests against Lando
        run: |
          set -euo pipefail
          export PLAYWRIGHT_BASE_URL="${{ steps.lando.outputs.base-url }}"
          if [[ "${{ steps.lando.outputs.ignore-https }}" == "true" ]]; then
            export PLAYWRIGHT_IGNORE_HTTPS_ERRORS=1
          fi
          # One worker: shared Lando MySQL + session state; avoids cross-spec races.
          pnpm exec playwright test --workers=1

      - name: Drain queue worker, assert DB empty, assert log line
        run: |
          set -euo pipefail
          BEFORE=$(lando mysql lamp -Nse "SELECT COUNT(*) FROM queue_jobs;")
          echo "queue_jobs rows before worker: $BEFORE"
          test "$BEFORE" != "0"
          lando php spark queue:work default --stop-when-empty -max-jobs 10 -sleep 2
          AFTER=$(lando mysql lamp -Nse "SELECT COUNT(*) FROM queue_jobs;")
          echo "queue_jobs rows after worker: $AFTER"
          test "$AFTER" = "0"

          echo "Assert queue job wrote to application log (NotifyEmployerNewApplication)"
          shopt -s nullglob
          MATCH=0
          for f in writable/logs/log-*.log; do
            if grep -q '\[Employer notify queued\]' "$f"; then
              MATCH=1
              echo "Found log marker in $f (last matching lines):"
              grep '\[Employer notify queued\]' "$f" | tail -n 5
              break
            fi
          done
          if [[ "$MATCH" -ne 1 ]]; then
            echo "Expected log line '[Employer notify queued]' not found under writable/logs/"
            ls -la writable/logs || true
            exit 1
          fi

      - name: Run Tasks housekeeping and check CLI + log output
        run: |
          set -euo pipefail
          OUT=$(lando php spark tasks:run --task jobportal-housekeeping 2>&1)
          printf '%s\n' "$OUT"
          echo "$OUT" | grep -q "published_jobs="

          echo "Assert housekeeping also wrote log_message line"
          shopt -s nullglob
          MATCH=0
          for f in writable/logs/log-*.log; do
            if grep -q '\[Job portal housekeeping\] published_jobs=' "$f"; then
              MATCH=1
              echo "Found log marker in $f:"
              grep '\[Job portal housekeeping\] published_jobs=' "$f" | tail -n 3
              break
            fi
          done
          if [[ "$MATCH" -ne 1 ]]; then
            echo "Expected '[Job portal housekeeping] published_jobs=' in writable/logs/"
            ls -la writable/logs || true
            exit 1
          fi

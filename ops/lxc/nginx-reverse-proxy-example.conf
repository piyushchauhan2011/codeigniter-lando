# Example nginx site for terminating TLS and proxying to php-fpm on another CT.
# Adjust paths, upstream IPs, and PHP socket/port for your lab.
#
# mkcert-generated PEM paths (on proxy CT):
#   ssl_certificate     /etc/nginx/ssl/jobportal.local.pem;
#   ssl_certificate_key /etc/nginx/ssl/jobportal.local-key.pem;

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

upstream php_upstream {
    server 10.0.100.20:9000;  # app CT php-fpm listen address
    keepalive 16;
}

server {
    listen 443 ssl http2;
    server_name jobportal.local;

    ssl_certificate     /etc/nginx/ssl/jobportal.local.pem;
    ssl_certificate_key /etc/nginx/ssl/jobportal.local-key.pem;

    root /var/empty;
    client_max_body_size 12m;

    location / {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/release/current/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param REQUEST_METHOD $request_method;
        fastcgi_param CONTENT_TYPE $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param DOCUMENT_URI $document_uri;
        fastcgi_param DOCUMENT_ROOT /var/www/release/current/public;
        fastcgi_param SERVER_PROTOCOL $server_protocol;
        fastcgi_param HTTPS on;
        fastcgi_pass php_upstream;
    }

    location ^~ /api/ {
        limit_req zone=api_limit burst=40 nodelay;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/release/current/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param REQUEST_METHOD $request_method;
        fastcgi_param CONTENT_TYPE $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param DOCUMENT_URI $document_uri;
        fastcgi_param DOCUMENT_ROOT /var/www/release/current/public;
        fastcgi_param SERVER_PROTOCOL $server_protocol;
        fastcgi_param HTTPS on;
        fastcgi_pass php_upstream;
    }
}

server {
    listen 80;
    server_name jobportal.local;
    return 301 https://$host$request_uri;
}

name: my-first-lamp-app
recipe: lamp
config:
  webroot: public
  php: "8.2"

# Global flag; LAMP still scans appserver URLs unless the service overrides below.
scanner: false

services:
  # PHPUnit: composer test:coverage / test:coverage:html need xdebug.mode to include
  # "coverage" (xdebug: true alone is only "debug"). Rebuild: lando rebuild -y
  appserver:
    xdebug: "debug,develop,coverage"
    scanner: false   # required to skip appserver URL probes (e.g. 127.0.0.1:8000)
    build_as_root:
      # Elastic APM PHP agent (native extension): https://github.com/elastic/apm-agent-php/releases
      - apt-get update -y && DEBIAN_FRONTEND=noninteractive apt-get install -y curl ca-certificates
      - |
          set -eu
          ARCH=$(uname -m)
          case "$ARCH" in aarch64|arm64) PKG="apm-agent-php_1.16.0_arm64.deb" ;; *) PKG="apm-agent-php_1.16.0_amd64.deb" ;; esac
          curl -fsSL -o /tmp/elastic-apm-php.deb "https://github.com/elastic/apm-agent-php/releases/download/v1.16.0/${PKG}"
          dpkg -i /tmp/elastic-apm-php.deb || apt-get install -f -y
    config:
      php: .lando/php.ini

  database:
    # Default lamp probe uses mysql with -p and hits host `database`; it often logs
    # several benign connection-refused retries + mysqld stderr noise on cold start.
    # Ping localhost inside the DB container instead (quiet, usual Docker MySQL pattern).
    healthcheck:
      command:
        - mysqladmin
        - ping
        - "-h"
        - localhost
        - "--silent"
      retries: 30
      delay: 2500

  redis:
    type: compose
    app_mount: false
    services:
      image: redis:7-alpine
      command: redis-server --appendonly no
      ports:
        - "6379"
    scanner: false

  memcached:
    type: compose
    app_mount: false
    services:
      image: memcached:1.6-alpine
      command: memcached -m 64
      ports:
        - "11211"
    scanner: false

  rabbitmq:
    type: compose
    app_mount: false
    services:
      image: rabbitmq:3-management
      command: docker-entrypoint.sh rabbitmq-server
      ports:
        - "5672"
        - "15672"
      environment:
        RABBITMQ_DEFAULT_USER: guest
        RABBITMQ_DEFAULT_PASS: guest
    scanner: false

  adminer:
    type: compose
    app_mount: false
    services:
      image: adminer:latest
      command: php -S 0.0.0.0:8080 -t /var/www/html
      ports:
        - "8080"
      environment:
        ADMINER_DEFAULT_SERVER: database
    scanner: false

  rustfs:
    type: compose
    app_mount: false
    services:
      image: rustfs/rustfs:latest
      command: rustfs
      user: root
      ports:
        - "9000"
        - "9001"
      environment:
        RUSTFS_ACCESS_KEY: rustfsadmin
        RUSTFS_SECRET_KEY: rustfsadmin
      volumes:
        - rustfs_data:/data
        - rustfs_logs:/logs
    scanner: false

  elasticsearch:
    type: compose
    app_mount: false
    services:
      image: docker.elastic.co/elasticsearch/elasticsearch:8.17.1
      command: /usr/local/bin/docker-entrypoint.sh eswrapper
      environment:
        discovery.type: single-node
        xpack.security.enabled: "false"
        xpack.security.enrollment.enabled: "false"
        cluster.routing.allocation.disk.threshold_enabled: "false"
        ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      ports:
        - "9200"
      volumes:
        - elasticsearch_data:/usr/share/elasticsearch/data
    scanner: false

  kibana:
    type: compose
    app_mount: false
    services:
      image: docker.elastic.co/kibana/kibana:8.17.1
      command: kibana-docker
      environment:
        ELASTICSEARCH_HOSTS: http://elasticsearch:9200
        SERVER_HOST: 0.0.0.0
        # Single label before .lndo.site so Lando *.lndo.site wildcard TLS matches (nested
        # kibana.my-first-lamp-app.lndo.site does not — HTTPS breaks in browsers).
        SERVER_PUBLICBASEURL: https://kibana-my-first-lamp-app.lndo.site
        # Stops Observability AI Assistant routes from 500'ing when security plugins expect a key (harmless for APM data; dev-only value).
        XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY: codeigniter-elk-lab-local-dev-key-at-least-32-chars-long
      ports:
        - "5601"
    scanner: false

  apm-server:
    type: compose
    app_mount: false
    services:
      image: docker.elastic.co/apm/apm-server:8.17.1
      command:
        - apm-server
        - -e
        - -E
        - apm-server.host=0.0.0.0:8200
        - -E
        - output.elasticsearch.hosts=["http://elasticsearch:9200"]
      ports:
        - "8200"
    scanner: false

  filebeat:
    type: compose
    app_mount: true
    services:
      image: docker.elastic.co/beats/filebeat:8.17.1
      user: root
      command: filebeat -e --strict.perms=false
      volumes:
        - ./.lando/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
    scanner: false

proxy:
  rabbitmq:
    - rabbitmq.my-first-lamp-app.lndo.site:15672
  adminer:
    - adminer.my-first-lamp-app.lndo.site:8080
  rustfs:
    - rustfs.my-first-lamp-app.lndo.site:9001
    - rustfs-api.my-first-lamp-app.lndo.site:9000
  kibana:
    - kibana-my-first-lamp-app.lndo.site:5601

tooling:
  elastic-health:
    service: appserver
    cmd: php spark elk:health
    description: Check Elasticsearch, Kibana, and APM Server from inside Lando
  elastic-reindex-jobs:
    service: appserver
    cmd: php spark elk:jobs:reindex
    description: Recreate the local jobs index and index current portal jobs
  elastic-search-jobs:
    service: appserver
    cmd: php spark elk:jobs:search
    description: Search indexed jobs (pass --q=php --location=remote)
  elastic-demo-logs:
    service: appserver
    cmd: php spark elk:logs:demo
    description: Write structured sample logs for Kibana Discover
  kibana-url:
    service: appserver
    cmd: >-
      php -r 'echo "HTTPS Kibana:".PHP_EOL."  https://kibana-my-first-lamp-app.lndo.site".PHP_EOL."HTTP fallback:".PHP_EOL."  http://kibana-my-first-lamp-app.lndo.site:8000".PHP_EOL.PHP_EOL."App:".PHP_EOL."  https://my-first-lamp-app.lndo.site".PHP_EOL.PHP_EOL."Sentry (self-hosted — see docs/SENTRY_SELF_HOSTED.md):".PHP_EOL."  UI typically http://localhost:9000 until you add Lando proxy / HTTPS.".PHP_EOL;'
    description: Print local Kibana and app URLs (Sentry documented separately)
  queue-work:
    service: appserver
    cmd: php spark queue:work default
    description: Run the queue worker for the default queue (same as lando php spark queue:work default)
  queue-work-payments:
    service: appserver
    cmd: php spark queue:work payments
    description: Run the payment queue worker backed by RabbitMQ
  queue-failed:
    service: appserver
    cmd: php spark queue:failed
    description: List failed queue jobs
  tasks-run:
    service: appserver
    cmd: php spark tasks:run
    description: Run due scheduled tasks (use --task name for a single named task)
